<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>석모도 국제 재생의학·웰니스 허브 — 브리핑</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root{
    --water:#17403E; --water-mid:#3D746C; --mist:#F5F1E8; --mist-deep:#ECE4D4;
    --sunset:#C08A3C; --sunset-soft:#D8A85C; --ink:#22201A; --stone:#877E6D;
    --line:rgba(34,32,26,.13);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;
    background:var(--mist);color:var(--ink);font-size:16px;line-height:1.7;letter-spacing:-.01em;
    -webkit-font-smoothing:antialiased}
  .serif{font-family:"Noto Serif KR",serif}
  .page{max-width:920px;margin:0 auto;background:var(--mist);box-shadow:0 0 60px rgba(0,0,0,.06)}
  .wrap{padding:0 56px}
  .eyebrow{font-size:12.5px;letter-spacing:.22em;color:var(--sunset);font-weight:600;margin-bottom:14px}

  /* 커버 */
  .cover{position:relative;color:var(--mist);padding:56px 56px 46px;overflow:hidden;
    background:radial-gradient(120% 100% at 85% 120%, rgba(216,168,92,.4) 0%, rgba(216,168,92,0) 50%),
      linear-gradient(150deg,#0E2E2C 0%, #17403E 55%, #2C5A50 100%)}
  .cover .tag{font-size:12px;letter-spacing:.2em;color:var(--sunset-soft);font-weight:600}
  .cover h1{font-family:"Noto Serif KR",serif;font-weight:600;font-size:clamp(28px,4.4vw,42px);
    line-height:1.28;margin:18px 0 14px}
  .cover .sub{font-size:16px;color:rgba(245,241,232,.82);font-weight:300;max-width:560px}
  .cover .frame{display:inline-flex;gap:10px;margin-top:26px;font-size:13px;letter-spacing:.06em}
  .cover .frame b{background:rgba(245,241,232,.12);border:1px solid rgba(216,168,92,.4);
    color:var(--sunset-soft);padding:7px 16px;border-radius:100px;font-weight:600}
  .confidential{position:absolute;top:22px;right:56px;font-size:11px;letter-spacing:.18em;
    color:rgba(245,241,232,.5)}

  section.blk{padding:44px 0}
  .num{font-family:"Noto Serif KR",serif;color:var(--sunset);font-size:15px;font-weight:600;letter-spacing:.1em}
  h2.head{font-family:"Noto Serif KR",serif;font-size:clamp(23px,3.2vw,30px);font-weight:600;
    line-height:1.35;margin:8px 0 20px;letter-spacing:-.02em}
  .lead{font-size:16.5px;color:#4A463C;line-height:1.8;max-width:680px}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px 30px;margin-top:26px}
  .item{border-top:1px solid var(--line);padding-top:16px}
  .item h4{font-family:"Noto Serif KR",serif;font-size:17px;font-weight:600;margin-bottom:5px}
  .item p{font-size:14.5px;color:#57533f;line-height:1.6}
  .item .badge{font-size:11.5px;letter-spacing:.08em;color:var(--sunset);font-weight:600;display:block;margin-bottom:3px}

  .rows{margin-top:22px;border-top:1px solid var(--line)}
  .row{display:grid;grid-template-columns:150px 1fr;gap:24px;padding:15px 0;border-bottom:1px solid var(--line);align-items:baseline}
  .row b{font-family:"Noto Serif KR",serif;font-size:18px;color:var(--water);font-weight:600}
  .row span{font-size:14.5px;color:#57533f;line-height:1.6}

  .dark{background:var(--water);color:var(--mist)}
  .dark .lead{color:rgba(245,241,232,.82)}
  .dark h2.head{color:var(--mist)}
  .dark .num{color:var(--sunset-soft)}
  .propose{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:28px}
  .propose .p{border-top:2px solid var(--sunset)}
  .propose .p{padding-top:16px}
  .propose .p h4{font-family:"Noto Serif KR",serif;font-size:19px;font-weight:600;margin-bottom:8px;color:var(--mist)}
  .propose .p p{font-size:14px;color:rgba(245,241,232,.8);line-height:1.65}
  .ask{margin-top:30px;background:rgba(245,241,232,.08);border:1px solid rgba(216,168,92,.35);
    border-radius:10px;padding:22px 24px}
  .ask h4{font-family:"Noto Serif KR",serif;color:var(--sunset-soft);font-size:16px;margin-bottom:8px}
  .ask p{font-size:14.5px;color:rgba(245,241,232,.85);line-height:1.7}

  .note{background:var(--mist-deep);padding:24px 56px;font-size:12.5px;color:var(--stone);line-height:1.7}
  .divider{height:1px;background:var(--line);margin:0 56px}

  @media (max-width:720px){
    .wrap,.cover,.note{padding-left:26px;padding-right:26px}
    .confidential{right:26px}
    .grid2,.propose{grid-template-columns:1fr}
    .row{grid-template-columns:110px 1fr;gap:14px}
  }
  @media print{.page{box-shadow:none}body{font-size:12px}}
</style>

<style>
  #lock{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 100% at 80% 110%, rgba(216,168,92,.35), rgba(216,168,92,0) 55%),
      linear-gradient(150deg,#0E2E2C,#17403E 60%,#2C5A50);font-family:"Pretendard Variable",Pretendard,sans-serif}
  #lock .card{width:min(90vw,380px);text-align:center;color:#F5F1E8;padding:8px}
  #lock .t{font-family:"Noto Serif KR",serif;font-size:26px;font-weight:600;letter-spacing:.02em}
  #lock .s{font-size:14px;color:rgba(245,241,232,.7);margin:12px 0 26px}
  #lock input{width:100%;padding:15px 18px;border-radius:10px;border:1px solid rgba(216,168,92,.4);
    background:rgba(245,241,232,.08);color:#F5F1E8;font-size:18px;text-align:center;letter-spacing:.3em;outline:none}
  #lock input:focus{border-color:#D8A85C}
  #lock button{width:100%;margin-top:14px;padding:15px;border:none;border-radius:10px;cursor:pointer;
    background:#D8A85C;color:#2a2010;font-size:16px;font-weight:600;letter-spacing:.06em;font-family:inherit}
  #lock button:hover{background:#C08A3C}
  #lock .err{color:#e8a; font-size:13px;margin-top:14px;min-height:18px}
  #lock .foot{margin-top:26px;font-size:11px;letter-spacing:.16em;color:rgba(245,241,232,.4)}
</style>
</head>
<body>
<div id="lock">
  <div class="card">
    <div class="t">회장님 브리핑</div>
    <div class="s">비공개 자료입니다.<br>접속 코드를 입력해 주세요.</div>
    <input id="pw" type="password" inputmode="numeric" placeholder="○ ○ ○ ○" autocomplete="off">
    <button id="go">입 장</button>
    <div class="err" id="err"></div>
    <div class="foot">CONFIDENTIAL · 석모도 국제 재생의학·웰니스 허브</div>
  </div>
</div>
<div id="app"></div>
